name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build Linux Wheel (Release)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc \
            g++ \
            make \
            python3-dev \
            libffi-dev \
            libssl-dev \
            pkg-config
      
      - name: Install Nuitka
        run: |
          uv pip install "Nuitka[build-wheel]>=4.1.3"
      
      - name: Build wheel with Nuitka
        run: |
          uv build --wheel --no-build-isolation --out-dir dist
      
      - name: Verify wheel
        run: |
          ls -la dist/
          unzip -l dist/*.whl
      
      - name: Test wheel import
        run: |
          pip install dist/*.whl
          python -c "from backtest_engine.data_provider import DataProviderClient; print('Import successful!')"
      
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: backtest-engine-linux-${{ matrix.python-version }}
          path: dist/*.whl
          retention-days: 30
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.whl
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}