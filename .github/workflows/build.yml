name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  build:
    name: Build Linux Wheel (Release)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]
    
    outputs:
      version: ${{ steps.version.outputs.version }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Extract version from pyproject.toml
        id: version
        run: |
          python3 -c "import tomllib; data = tomllib.load(open('pyproject.toml', 'rb')); print(f'version={data[\"project\"][\"version\"]}')" >> $GITHUB_OUTPUT
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc \
            g++ \
            make \
            python3-dev \
            libffi-dev \
            libssl-dev \
            pkg-config
      
      - name: Create virtual environment and install dependencies
        run: |
          uv venv
          uv sync --dev
          uv pip install "Nuitka[build-wheel]>=4.1.3"
      
      - name: Build wheel with Nuitka
        run: |
          uv run uv build --wheel --no-build-isolation --out-dir dist
      
      - name: Verify wheel
        run: |
          ls -la dist/
          unzip -l dist/*.whl
      
      - name: Test wheel import
        run: |
          uv pip install dist/*.whl
          uv run python -c "from backtest_engine.data_provider import DataProviderClient; print('Import successful!')"
      
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: backtest-engine-linux-${{ matrix.python-version }}-${{ steps.version.outputs.version }}
          path: dist/*.whl
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download wheel artifact
        uses: actions/download-artifact@v8
        with:
          name: backtest-engine-linux-3.13-${{ needs.build.outputs.version }}
          path: dist
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          tag_name: v${{ needs.build.outputs.version }}
          release_name: Release v${{ needs.build.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: false